<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>X Auto Publisher</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#0f0f0f;
color:white;
padding:20px;
}

.container{
max-width:500px;
margin:auto;
}

.card{
background:#181818;
padding:20px;
border-radius:25px;
margin-bottom:20px;
border:1px solid #2a2a2a;
}

h1{
text-align:center;
margin-bottom:15px;
}

p{
text-align:center;
color:#888;
margin-bottom:30px;
line-height:1.8;
}

textarea,input{
width:100%;
padding:15px;
background:#111;
border:1px solid #333;
border-radius:15px;
color:white;
margin-top:10px;
margin-bottom:15px;
font-size:16px;
}

textarea{
height:180px;
resize:none;
}

button{
width:100%;
padding:16px;
border:none;
border-radius:15px;
font-size:17px;
cursor:pointer;
margin-top:10px;
}

.ai{
background:#7c3aed;
color:white;
}

.publish{
background:#2563eb;
color:white;
}

.schedule{
background:#16a34a;
color:white;
}

.preview{
background:#101010;
padding:20px;
border-radius:20px;
line-height:2;
border:1px solid #2a2a2a;
min-height:150px;
white-space:pre-wrap;
}

.loading{
text-align:center;
color:#999;
margin-top:15px;
line-height:1.8;
}

</style>

</head>

<body>

<div class="container">

<h1>🚀 X Auto Publisher</h1>

<p>
أداة ذكية لتحسين وجدولة المحتوى لمنصة X
</p>

<div class="card">

<label>محتوى المنشور</label>

<textarea
id="post"
placeholder="اكتب المحتوى الخام هنا..."></textarea>

<label>الرابط (اختياري)</label>

<input
id="link"
type="text"
placeholder="https://example.com">

<label>رفع الشعار</label>

<input
type="file"
id="imageInput">

<button
class="ai"
onclick="generatePost()">

✨ تحسين المحتوى

</button>

<div
class="loading"
id="loading">
</div>

</div>

<div class="card">

<label>معاينة التغريدة</label>

<div
class="preview"
id="preview">

سيظهر المحتوى هنا...

</div>

<button
class="publish"
onclick="publishPost()">

🚀 نشر الآن

</button>

<button class="schedule">
⏰ جدولة ذكية
</button>

</div>

</div>

<script>

async function generatePost(){

const text =
document.getElementById("post").value;

const link =
document.getElementById("link").value;

document.getElementById("loading")
.innerText = "جاري تحسين المحتوى...";

const prompt = `
حول النص التالي إلى تغريدة احترافية لمنصة X.

الشروط:
- بداية جذابة
- تنسيق احترافي
- مختصرة
- مناسبة للتفاعل
- استخدم إيموجي بسيطة

النص:
${text}

الرابط:
${link}
`;

try{

const response =
await fetch(
"/api/openai",
{
method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
prompt:prompt
})

});

const data =
await response.json();

if(!data.choices){

document.getElementById("loading")
.innerText =
"فشل تحسين المحتوى";

return;

}

const result =
data.choices[0].message.content;

document.getElementById("preview")
.innerText = result;

document.getElementById("loading")
.innerText =
"✅ تم تحسين المحتوى بنجاح";

}catch(error){

document.getElementById("loading")
.innerText =
"حدث خطأ أثناء التحسين";

}

}

async function publishPost(){

const content =
document.getElementById("preview").innerText;

if(
!content ||
content.includes("سيظهر المحتوى هنا")
){
alert("لا يوجد محتوى للنشر");
return;
}

document.getElementById("loading")
.innerText =
"جاري النشر على X...";

try{

const imageFile =
document.getElementById("imageInput")
.files[0];

let imageBase64 = null;

if(imageFile){

const reader = new FileReader();

imageBase64 =
await new Promise((resolve)=>{

reader.onload = () => {

resolve(
reader.result.split(",")[1]
);

};

reader.readAsDataURL(imageFile);

});

}

const response =
await fetch(
"/api/publish",
{
method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

text:content,

image:imageBase64

})

});

const data =
await response.json();

console.log(data);

if(data.success){

document.getElementById("loading")
.innerText =
"✅ تم النشر بنجاح";

}else{

document.getElementById("loading")
.innerText =
"❌ فشل النشر";

}

}catch(error){

document.getElementById("loading")
.innerText =
"حدث خطأ أثناء النشر";

}

}

</script>

</body>
</html>

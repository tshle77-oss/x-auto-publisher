<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>X Auto Publisher</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial;
    }

    body{
      background:#0f0f0f;
      color:white;
      padding:20px;
    }

    .container{
      max-width:500px;
      margin:auto;
    }

    .header{
      text-align:center;
      margin-bottom:25px;
    }

    .header h1{
      font-size:32px;
      margin-bottom:10px;
    }

    .header p{
      color:#999;
      line-height:1.8;
    }

    .card{
      background:#181818;
      border:1px solid #2a2a2a;
      border-radius:24px;
      padding:20px;
      margin-bottom:20px;
    }

    .label{
      margin-bottom:10px;
      display:block;
      font-size:15px;
      color:#ccc;
    }

    textarea,
    input{
      width:100%;
      background:#101010;
      border:1px solid #333;
      color:white;
      padding:15px;
      border-radius:16px;
      margin-bottom:15px;
      font-size:16px;
    }

    textarea{
      height:180px;
      resize:none;
    }

    input[type=file]{
      padding:12px;
      background:#111;
    }

    button{
      width:100%;
      border:none;
      border-radius:16px;
      padding:16px;
      font-size:17px;
      cursor:pointer;
      margin-top:10px;
      transition:.3s;
    }

    .ai-btn{
      background:#7c3aed;
      color:white;
    }

    .publish-btn{
      background:#2563eb;
      color:white;
    }

    .schedule-btn{
      background:#16a34a;
      color:white;
    }

    .preview{
      background:#101010;
      border-radius:18px;
      padding:18px;
      line-height:2;
      border:1px solid #2a2a2a;
      color:#eee;
    }

    .tag{
      display:inline-block;
      background:#27272a;
      color:#aaa;
      padding:8px 14px;
      border-radius:100px;
      margin-bottom:15px;
      font-size:14px;
    }

    .footer{
      text-align:center;
      color:#666;
      margin-top:30px;
      font-size:14px;
    }
  </style>
</head>

<body>

<div class="container">

  <div class="header">

    <h1>🚀 X Auto Publisher</h1>

    <p>
      أداة ذكية لتحسين وجدولة ونشر المحتوى على منصة X
    </p>

  </div>

  <div class="card">

    <div class="tag">
      AI Powered
    </div>

    <label class="label">
      محتوى المنشور
    </label>

    <textarea id="post"
      placeholder="اكتب المحتوى الخام هنا..."></textarea>

    <label class="label">
      الرابط (اختياري)
    </label>

    <input type="text"
      placeholder="https://example.com">

    <label class="label">
      رفع الشعار
    </label>

    <input type="file">

    <button class="ai-btn"
      onclick="generatePost()">
      ✨ تحسين المحتوى بالذكاء الاصطناعي
    </button>

  </div>

  <div class="card">

    <label class="label">
      معاينة التغريدة
    </label>

    <div class="preview" id="preview">

      سيظهر المحتوى المحسن هنا...

    </div>

    <button class="publish-btn">
      🚀 نشر الآن
    </button>

    <button class="schedule-btn">
      ⏰ جدولة ذكية
    </button>

  </div>

  <div class="footer">

    Powered By AI

  </div>

</div>

<script>

function generatePost(){

  let text =
    document.getElementById("post").value;

  let finalText = `
🚨 ${text}

✅ رواتب ومزايا تنافسية

📍 التقديم والتفاصيل:
الرابط
`;

  document.getElementById("preview")
    .innerText = finalText;

}

</script>

</body>

</html>
